name: park_wallet
description: "Aplicativo para pagamento interno do parque e resort Itaipuland."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  package_info_plus: ^8.3.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  socket_io_client: ^2.0.3+1
  path_provider: ^2.1.2
  cached_network_image: ^3.3.1
  http: ^1.3.0
  mobile_scanner: ^7.0.0
  google_maps_flutter: ^2.6.0
  permission_handler: ^11.3.0
  geolocator: ^9.0.2
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/bottom_waves.svg
    - assets/images/logo.png
    - assets/images/logo_min.png
    - assets/images/brasil-circle-flag.png
    - assets/images/spain-circle-flag.png
    - assets/images/uk-circle-flag.png
    - assets/images/pamonha.png
    - assets/images/pins/pin_attraction.png
    - assets/images/pins/pin_other.png
    - assets/images/pins/pin_store.png
    - assets/images/pins/pin_attraction_selected.png
    - assets/images/pins/pin_other_selected.png
    - assets/images/pins/pin_store_selected.png 
    - assets/map_style.json

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_min.png"

flutter_native_splash:
  color: "#ffffff" # Fundo branco
  image: assets/images/logo_min.png
  android: true
  ios: false
  fullscreen: true
  android_gravity: center
  ios_content_mode: center